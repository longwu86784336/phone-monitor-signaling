services:
  - type: web
    name: phone-monitor-signaling
    env: node
    plan: free
    region: oregon  # 美国西海岸，亚洲访问延迟较低
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000  # Render 会自动覆盖为实际 PORT，这里只是文档说明
